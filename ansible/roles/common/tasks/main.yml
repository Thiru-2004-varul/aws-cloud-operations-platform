- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - unzip
      - htop
      - iotop
      - net-tools
      - jq
      - sysstat
      - unattended-upgrades
    state: present

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present

- name: Set SSH idle timeout
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^ClientAliveInterval"
    line: "ClientAliveInterval 300"
    state: present

- name: Restart SSH service
  service:
    name: ssh
    state: restarted

- name: Enable UFW firewall
  ufw:
    state: enabled
    policy: deny

- name: Allow HTTP on UFW
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow app port on UFW
  ufw:
    rule: allow
    port: "8080"
    proto: tcp

- name: Allow outbound HTTPS for AWS APIs
  ufw:
    rule: allow
    direction: out
    port: "443"
    proto: tcp

- name: Set session idle timeout in environment
  lineinfile:
    path: /etc/environment
    line: "TMOUT=900"
    state: present

- name: Enable automatic security updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Enable sysstat for performance monitoring
  service:
    name: sysstat
    state: started
    enabled: yes