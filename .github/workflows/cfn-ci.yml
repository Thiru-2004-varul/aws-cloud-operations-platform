name: CloudFormation CI

on:
  push:
    paths:
      - 'cloudformation/**'
  pull_request:
    paths:
      - 'cloudformation/**'

jobs:
  validate:
    name: Validate CloudFormation Templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint network stack
        run: cfn-lint cloudformation/stacks/network-stack.yaml || true

      - name: Lint security stack
        run: cfn-lint cloudformation/stacks/security-stack.yaml || true

      - name: Lint compute stack
        run: cfn-lint cloudformation/stacks/compute-stack.yaml || true

      - name: Validate network stack with AWS
        run: aws cloudformation validate-template --template-body file://cloudformation/stacks/network-stack.yaml

      - name: Validate security stack with AWS
        run: aws cloudformation validate-template --template-body file://cloudformation/stacks/security-stack.yaml

      - name: Validate compute stack with AWS
        run: aws cloudformation validate-template --template-body file://cloudformation/stacks/compute-stack.yaml

      - name: All templates validated
        run: echo "Phase 1 CloudFormation templates passed validation"