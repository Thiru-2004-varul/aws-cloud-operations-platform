name: CloudFormation CI

on:
  push:
    paths:
      - 'cloudformation/**'
      - 'app/**'
  pull_request:
    paths:
      - 'cloudformation/**'
      - 'app/**'

jobs:
  validate:
    name: Validate CloudFormation Templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint all stacks
        run: |
          cfn-lint cloudformation/stacks/network-stack.yaml || true
          cfn-lint cloudformation/stacks/security-stack.yaml || true
          cfn-lint cloudformation/stacks/compute-stack.yaml || true
          cfn-lint cloudformation/stacks/ssm-stack.yaml || true
          cfn-lint cloudformation/stacks/secrets-stack.yaml || true
          cfn-lint cloudformation/stacks/backup-stack.yaml || true
          cfn-lint cloudformation/stacks/monitoring-stack.yaml || true

      - name: Validate all stacks with AWS
        run: |
          aws cloudformation validate-template --template-body file://cloudformation/stacks/network-stack.yaml
          aws cloudformation validate-template --template-body file://cloudformation/stacks/security-stack.yaml
          aws cloudformation validate-template --template-body file://cloudformation/stacks/compute-stack.yaml
          aws cloudformation validate-template --template-body file://cloudformation/stacks/ssm-stack.yaml
          aws cloudformation validate-template --template-body file://cloudformation/stacks/secrets-stack.yaml
          aws cloudformation validate-template --template-body file://cloudformation/stacks/backup-stack.yaml
          aws cloudformation validate-template --template-body file://cloudformation/stacks/monitoring-stack.yaml

  test-app:
    name: Test Flask Application
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install flask boto3 hvac pytest

      - name: Test app imports
        run: |
          cd app
          python3 -c "from app import app; print('App imports OK')"