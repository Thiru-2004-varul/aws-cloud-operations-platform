name: Ansible Baseline

on:
  workflow_dispatch:
  push:
    paths:
      - 'ansible/**'

jobs:
  ansible-lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and lint
        run: pip install ansible ansible-lint boto3

      - name: Lint playbooks
        run: ansible-lint ansible/playbooks/linux-baseline.yml || true

  ansible-deploy:
    name: Run Ansible Baseline
    runs-on: ubuntu-latest
    needs: ansible-lint
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install Ansible and AWS collections
        run: |
          pip install ansible boto3 botocore
          ansible-galaxy collection install amazon.aws community.aws

      - name: Check if EC2 instances are running
        id: check_hosts
        run: |
          cd ansible
          HOST_COUNT=$(ansible-inventory -i inventory/aws_ec2.yaml --list 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          hosts = data.get('_meta', {}).get('hostvars', {})
          print(len(hosts))
          ")
          echo "host_count=$HOST_COUNT" >> $GITHUB_OUTPUT
          echo "Found $HOST_COUNT hosts"

      - name: Run baseline playbook
        if: steps.check_hosts.outputs.host_count != '0'
        run: |
          cd ansible
          ansible-playbook playbooks/linux-baseline.yml \
            -i inventory/aws_ec2.yaml \
            -e "ansible_connection=aws_ssm" \
            -e "ansible_aws_ssm_region=ap-south-1" \
            -v

      - name: Skip - no EC2 instances running
        if: steps.check_hosts.outputs.host_count == '0'
        run: echo "No EC2 instances running. Deploy stacks first then re-run this workflow."