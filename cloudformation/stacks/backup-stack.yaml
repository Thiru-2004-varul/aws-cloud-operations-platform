AWSTemplateFormatVersion: "2010-09-09"
Description: Backup and DR Stack - AWS Backup plans, vaults, recovery points. aws-cloud-operations-platform

Parameters:
  ProjectName:
    Type: String
    Default: cloud-ops

  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

Resources:

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub "${ProjectName}-${Environment}-backup-vault"

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-backup-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  DailyBackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub "${ProjectName}-${Environment}-daily-backup"
        BackupPlanRule:
          - RuleName: DailyEC2Backup
            TargetBackupVaultName: !Ref BackupVault
            ScheduleExpression: cron(0 1 * * ? *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              MoveToColdStorageAfterDays: 7
              DeleteAfterDays: 97
          - RuleName: WeeklyEC2Backup
            TargetBackupVaultName: !Ref BackupVault
            ScheduleExpression: cron(0 2 ? * SUN *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 90

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref DailyBackupPlan
      BackupSelection:
        SelectionName: !Sub "${ProjectName}-${Environment}-ec2-selection"
        IamRoleArn: !GetAtt BackupRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: Project
            ConditionValue: !Ref ProjectName
          - ConditionType: STRINGEQUALS
            ConditionKey: Environment
            ConditionValue: !Ref Environment

  BackupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/backup/${ProjectName}-${Environment}"
      RetentionInDays: 30

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-${Environment}-alerts"

  EC2RecoveryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Environment}-ec2-status-check"
      AlarmDescription: EC2 instance status check failed
      MetricName: StatusCheckFailed
      Namespace: AWS/EC2
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SNSTopic

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Environment}-high-cpu"
      AlarmDescription: CPU utilization above 80 percent for 5 minutes
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SNSTopic

  ALB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Environment}-alb-5xx-errors"
      AlarmDescription: ALB returning 5xx errors
      MetricName: HTTPCode_Target_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: LoadBalancer
          Value: !ImportValue
            Fn::Sub: "${ProjectName}-${Environment}-ALBArn"
      AlarmActions:
        - !Ref SNSTopic

Outputs:
  BackupVaultArn:
    Value: !GetAtt BackupVault.BackupVaultArn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-BackupVaultArn"

  BackupPlanId:
    Value: !Ref DailyBackupPlan
    Export:
      Name: !Sub "${ProjectName}-${Environment}-BackupPlanId"

  SNSTopicArn:
    Value: !Ref SNSTopic
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SNSTopicArn"