AWSTemplateFormatVersion: "2010-09-09"
Description: Monitoring Stack - CloudWatch log groups, metric filters, dashboard. aws-cloud-operations-platform

Parameters:
  ProjectName:
    Type: String
    Default: cloud-ops

  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

Resources:

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/ec2/${ProjectName}-${Environment}/app"
      RetentionInDays: 30

  SyslogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/ec2/${ProjectName}-${Environment}/syslog"
      RetentionInDays: 30

  AuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/ec2/${ProjectName}-${Environment}/auth"
      RetentionInDays: 30

  FirewallLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/ec2/${ProjectName}-${Environment}/firewall"
      RetentionInDays: 30

  AppErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AppLogGroup
      FilterPattern: "ERROR"
      MetricTransformations:
        - MetricName: AppErrorCount
          MetricNamespace: !Sub "${ProjectName}/${Environment}"
          MetricValue: "1"
          DefaultValue: 0

  AppErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${Environment}-app-errors"
      AlarmDescription: Application error rate is high
      MetricName: AppErrorCount
      Namespace: !Sub "${ProjectName}/${Environment}"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ProjectName}-${Environment}-operations"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "EC2 CPU Utilization",
                "metrics": [
                  ["AWS/EC2", "CPUUtilization", "AutoScalingGroupName", "${ProjectName}-${Environment}-ubuntu-asg"]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "ALB Request Count",
                "metrics": [
                  ["AWS/ApplicationELB", "RequestCount", {"stat": "Sum"}],
                  ["AWS/ApplicationELB", "HTTPCode_Target_5XX_Count", {"stat": "Sum"}]
                ],
                "period": 60,
                "region": "${AWS::Region}",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Custom Metrics - Memory and Disk",
                "metrics": [
                  ["CloudOps/EC2", "mem_used_percent"],
                  ["CloudOps/EC2", "disk_used_percent"]
                ],
                "period": 60,
                "region": "${AWS::Region}",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-${Environment}-operations"
    Export:
      Name: !Sub "${ProjectName}-${Environment}-DashboardURL"

  AppLogGroupName:
    Value: !Ref AppLogGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-AppLogGroupName"