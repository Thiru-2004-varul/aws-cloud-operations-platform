AWSTemplateFormatVersion: "2010-09-09"
Description: Secrets Stack - KMS, AWS Secrets Manager, secret policies. aws-cloud-operations-platform

Parameters:
  ProjectName:
    Type: String
    Default: cloud-ops

  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

Resources:

  SecretsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting secrets
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"
          - Sid: AllowEC2RoleAccess
            Effect: Allow
            Principal:
              AWS: !ImportValue
                Fn::Sub: "${ProjectName}-${Environment}-EC2RoleArn"
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  SecretsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-${Environment}-secrets"
      TargetKeyId: !Ref SecretsKMSKey

  DBCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/db/credentials"
      Description: Database credentials for the application
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "host": "db.${ProjectName}-${Environment}.internal",
          "port": "5432",
          "username": "appuser",
          "password": "1S8JBNXWtc9VuWkUexmu1w==",
          "dbname": "${ProjectName}_${Environment}"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  APIKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/app/api-key"
      Description: External API key for the application
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "api_key": "dev-api-key-12345",
          "api_endpoint": "https://api.example.com",
          "environment": "${Environment}"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AppConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ProjectName}/${Environment}/app/config"
      Description: Application configuration secrets
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub |
        {
          "flask_secret_key": "425fd515d90cadfb5a2f4be95f5d8a96fc2094ca3efbe0ff4bce124ac395cc15",
          "jwt_secret": "e3113fb73c15467d0f24d241bf8ec445fca16a6108d26574dbb1bb0b63743c74",
          "environment": "${Environment}"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  SecretsResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref DBCredentialsSecret
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEC2RoleAccess
            Effect: Allow
            Principal:
              AWS: !ImportValue
                Fn::Sub: "${ProjectName}-${Environment}-EC2RoleArn"
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: "*"

Outputs:
  SecretsKMSKeyId:
    Value: !Ref SecretsKMSKey
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SecretsKMSKeyId"

  SecretsKMSKeyArn:
    Value: !GetAtt SecretsKMSKey.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SecretsKMSKeyArn"

  DBCredentialsSecretArn:
    Value: !Ref DBCredentialsSecret
    Export:
      Name: !Sub "${ProjectName}-${Environment}-DBCredentialsSecretArn"

  APIKeySecretArn:
    Value: !Ref APIKeySecret
    Export:
      Name: !Sub "${ProjectName}-${Environment}-APIKeySecretArn"

  AppConfigSecretArn:
    Value: !Ref AppConfigSecret
    Export:
      Name: !Sub "${ProjectName}-${Environment}-AppConfigSecretArn"