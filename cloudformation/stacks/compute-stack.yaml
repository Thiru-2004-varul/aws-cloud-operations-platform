AWSTemplateFormatVersion: "2010-09-09"
Description: Compute Stack - ALB, Ubuntu EC2 ASG, Windows EC2, Auto Scaling. aws-cloud-operations-platform

Parameters:
  ProjectName:
    Type: String
    Default: cloud-ops

  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

  InstanceType:
    Type: String
    Default: t3.micro

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id

  WindowsAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base

Resources:

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: "${ProjectName}-${Environment}-PublicSubnet1Id"
        - !ImportValue
          Fn::Sub: "${ProjectName}-${Environment}-PublicSubnet2Id"
      SecurityGroups:
        - !ImportValue
          Fn::Sub: "${ProjectName}-${Environment}-ALBSecurityGroupId"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-alb"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-tg"
      Port: 80
      Protocol: HTTP
      VpcId: !ImportValue
        Fn::Sub: "${ProjectName}-${Environment}-VpcId"
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-tg"

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  UbuntuLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ProjectName}-${Environment}-ubuntu-lt"
      LaunchTemplateData:
        ImageId: !Ref UbuntuAMI
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !ImportValue
            Fn::Sub: "${ProjectName}-${Environment}-EC2InstanceProfileArn"
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "${ProjectName}-${Environment}-LinuxEC2SecurityGroupId"
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            apt-get update -y
            apt-get install -y python3 python3-pip curl unzip

            pip3 install flask boto3

            cat > /opt/app.py << 'APPEOF'
            from flask import Flask, jsonify
            import time

            app = Flask(__name__)
            start_time = time.time()

            @app.route('/health')
            def health():
                return jsonify({"status": "healthy", "uptime_seconds": int(time.time() - start_time)}), 200

            @app.route('/metrics')
            def metrics():
                return jsonify({"uptime_seconds": int(time.time() - start_time), "status": "running"}), 200

            @app.route('/')
            def index():
                return jsonify({"message": "aws-cloud-operations-platform", "environment": "dev"}), 200

            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=80)
            APPEOF

            python3 /opt/app.py &

            curl -O https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
            dpkg -i amazon-cloudwatch-agent.deb

            curl -O https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
            pip3 install aws-cfn-bootstrap-py3-latest.tar.gz

            /usr/local/bin/cfn-signal -e $? \
              --stack ${AWS::StackName} \
              --resource UbuntuAutoScalingGroup \
              --region ${AWS::Region}
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${ProjectName}-${Environment}-ubuntu-ec2"
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment
              - Key: OS
                Value: Ubuntu

  UbuntuAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${ProjectName}-${Environment}-ubuntu-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref UbuntuLaunchTemplate
        Version: !GetAtt UbuntuLaunchTemplate.LatestVersionNumber
      MinSize: "1"
      MaxSize: "4"
      DesiredCapacity: "2"
      VPCZoneIdentifier:
        - !ImportValue
          Fn::Sub: "${ProjectName}-${Environment}-PrivateSubnet1Id"
        - !ImportValue
          Fn::Sub: "${ProjectName}-${Environment}-PrivateSubnet2Id"
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 180
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-ubuntu-ec2"
          PropagateAtLaunch: true
    CreationPolicy:
      ResourceSignal:
        Count: 2
        Timeout: PT15M

  WindowsEC2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: t3.micro
      IamInstanceProfile: !ImportValue
        Fn::Sub: "${ProjectName}-${Environment}-EC2InstanceProfileArn"
      SubnetId: !ImportValue
        Fn::Sub: "${ProjectName}-${Environment}-PrivateSubnet1Id"
      SecurityGroupIds:
        - !ImportValue
          Fn::Sub: "${ProjectName}-${Environment}-WindowsEC2SecurityGroupId"
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          Install-WindowsFeature -Name Web-Server -IncludeManagementTools
          Start-Service W3SVC
          Set-Service W3SVC -StartupType Automatic
          </powershell>
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-windows-ec2"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: OS
          Value: Windows

  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref UbuntuAutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0

Outputs:
  ALBDNSName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ALBDNSName"

  ALBArn:
    Value: !Ref ALB
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ALBArn"

  ALBTargetGroupArn:
    Value: !Ref ALBTargetGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ALBTargetGroupArn"

  WindowsEC2Id:
    Value: !Ref WindowsEC2
    Export:
      Name: !Sub "${ProjectName}-${Environment}-WindowsEC2Id"

  UbuntuASGName:
    Value: !Ref UbuntuAutoScalingGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-UbuntuASGName"